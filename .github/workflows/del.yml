name: Delete Branches Except Master

on:
  workflow_dispatch: # 手动触发

jobs:
  delete-branches:
    runs-on: ubuntu-latest
    permissions:
      contents: write # 必须赋予写入权限才能删除分支

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # 获取所有分支的历史记录

      - name: Delete other branches
        run: |
          # 获取远程仓库的所有分支，排除 master 和 HEAD
          # 如果你的主分支是 main，请将 master 改为 main
          branches_to_delete=$(git branch -r | grep -vE "origin/master|origin/HEAD" | sed 's/origin\///')

          if [ -z "$branches_to_delete" ]; then
            echo "没有发现需要删除的分支。"
          else
            echo "准备删除以下分支:"
            echo "$branches_to_delete"
            
            for branch in $branches_to_delete; do
              git push origin --delete "$branch"
            done
          fi
