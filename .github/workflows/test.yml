name: 测试

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    # 新增：手动触发时允许输入版本号
    inputs:
      version:
        description: '发布版本号 (例如: v1.0.0)'
        required: true
        default: 'test'

permissions:
  contents: write

jobs:
  build:
    name: Build Vane
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # 1. 确定版本号变量：如果是 Tag 触发则用 tag，手动触发则用输入的变量
      - name: Set Version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "RELEASE_VERSION=${{ github.event.inputs.version }}" >> $GITHUB_ENV
          else
            echo "RELEASE_VERSION=${{ github.ref_name }}" >> $GITHUB_ENV
          fi

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'
          cache: true

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install frontend dependencies
        working-directory: web
        run: npm install

      - name: Build frontend
        working-directory: web
        run: npm run build

      - name: Download Go dependencies
        run: |
          go mod tidy
          go mod download

      - name: Build linux/arm64
        env:
          GOOS: linux
          GOARCH: arm64
          CGO_ENABLED: 0
        run: |
          go build -ldflags="-s -w -X main.Version=${{ github.ref_name }}" \
            -trimpath -o vane-linux-arm64 .

      - name: Checksum
        run: sha256sum vane-linux-arm64 > sha256sums.txt

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          # 使用统一的变量名
          tag_name: ${{ env.RELEASE_VERSION }}
          name: "Vane ${{ env.RELEASE_VERSION }}"
          body: |
            ## 🌀 Vane ${{ env.RELEASE_VERSION }}

            ### 下载
            | 平台 | 文件 |
            |------|------|
            | Linux ARM64 | `vane-linux-arm64` |

            ### 快速开始
            ```bash
            chmod +x vane-linux-arm64
            ./vane-linux-arm64
            ```
            访问: http://your-ip:4455
            账号: admin / admin
          files: |
            vane-linux-arm64
            sha256sums.txt
          draft: false
          prerelease: false
