name: 测试发布

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: '手动指定版本号 (留空则自动生成时间戳)'
        required: false
        default: ''

permissions:
  contents: write

jobs:
  build:
    name: Build Vane
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # 1. 确定版本号：优先使用 Tag，其次使用输入值，最后使用当前时间
      - name: Set Version
        run: |
          if [ "${{ github.event_name }}" = "push" ]; then
            echo "RELEASE_VERSION=${{ github.ref_name }}" >> $GITHUB_ENV
          elif [ -n "${{ github.event.inputs.version }}" ]; then
            echo "RELEASE_VERSION=${{ github.event.inputs.version }}" >> $GITHUB_ENV
          else
            # 格式：v2026.03.28-0734 (根据当前 UTC 时间)
            echo "RELEASE_VERSION=v$(date +'%Y.%m.%d-%H%M')" >> $GITHUB_ENV
          fi

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'
          cache: true

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install frontend dependencies
        working-directory: web
        run: npm install

      - name: Build frontend
        working-directory: web
        run: npm run build

      - name: Download Go dependencies
        run: |
          go mod tidy
          go mod download

      - name: Build linux/arm64
        env:
          GOOS: linux
          GOARCH: arm64
          CGO_ENABLED: 0
        run: |
          # 修复：使用环境变量中的版本号写入二进制
          go build -ldflags="-s -w -X main.Version=${{ env.RELEASE_VERSION }}" \
            -trimpath -o vane-linux-arm64 .

      - name: Checksum
        run: sha256sum vane-linux-arm64 > sha256sums.txt

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.RELEASE_VERSION }}
          name: "Vane ${{ env.RELEASE_VERSION }} (Pre-release)"
          body: |
            ## 🌀 Vane ${{ env.RELEASE_VERSION }}
            > 这是一个自动生成的预览版本。

            ### 下载
            | 平台 | 文件 |
            |------|------|
            | Linux ARM64 | `vane-linux-arm64` |

            ### 快速开始
            ```bash
            chmod +x vane-linux-arm64
            ./vane-linux-arm64
            ```
            访问: http://your-ip:4455
            账号: admin / admin
          files: |
            vane-linux-arm64
            sha256sums.txt
          draft: false
          # 修改：默认发布为预发布版本
          prerelease: true
