name: Build & Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: '发布版本号 (例如: v1.0.0)'
        required: true
        default: 'v1.0.'

permissions:
  contents: write

jobs:
  build:
    name: Build & Push
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # 1. 解析版本号
      - name: Resolve version
        id: ver
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "value=${{ github.event.inputs.version }}" >> $GITHUB_OUTPUT
          else
            echo "value=${{ github.ref_name }}" >> $GITHUB_OUTPUT
          fi

      # 2. 编译环境准备
      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'
          cache: true

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      # 3. 构建前端
      - name: Build frontend
        working-directory: web
        run: |
          npm install
          npm run build

      # 4. 编译多架构二进制
      - name: Build Binaries
        run: |
          go mod tidy
          # 编译 amd64
          GOOS=linux GOARCH=amd64 CGO_ENABLED=0 go build -ldflags="-s -w -X main.Version=${{ steps.ver.outputs.value }}" -trimpath -o vane-linux-amd64 .
          # 编译 arm64
          GOOS=linux GOARCH=arm64 CGO_ENABLED=0 go build -ldflags="-s -w -X main.Version=${{ steps.ver.outputs.value }}" -trimpath -o vane-linux-arm64 .

      # 5. 设置 Docker Buildx (支持多架构构建)
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # 6. 登录 DockerHub
      - name: Login to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      # 7. 构建并推送 Docker 镜像
      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/vane:latest
            ${{ secrets.DOCKER_USERNAME }}/vane:${{ steps.ver.outputs.value }}

      # 8. 创建 GitHub Release
      - name: Create Release
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/') || github.event_name == 'workflow_dispatch'
        with:
          tag_name: ${{ steps.ver.outputs.value }}
          name: "Vane ${{ steps.ver.outputs.value }}"
          body: |
            ## 🌀 Vane ${{ steps.ver.outputs.value }}

            ### Docker 镜像
            `docker pull ${{ secrets.DOCKER_USERNAME }}/vane:${{ steps.ver.outputs.value }}`

            ### 下载二进制
            | 平台 | 文件 |
            |------|------|
            | Linux x86_64 | `vane-linux-amd64` |
            | Linux ARM64 | `vane-linux-arm64` |

            ### 快速开始 (Docker)
            ```bash
            docker run -d \
              --name vane \
              -p 4455:4455 \
              -v /etc/vane:/app/data \
              ${{ secrets.DOCKER_USERNAME }}/vane:latest
            ```
          files: |
            vane-linux-amd64
            vane-linux-arm64
            sha256sums.txt
          draft: false
          prerelease: false
