name: Build & Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: '发布版本号 (例如: v1.0.0)'
        required: true
        default: 'v1.0.0'

permissions:
  contents: write

jobs:
  # ─── 1. 构建前端 ─────────────────────────────────────────────────────────────
  build-frontend:
    name: Build Frontend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Build frontend
        working-directory: web
        run: |
          npm install
          npm run build

      - name: Upload frontend dist
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: web/dist/
          retention-days: 1

  # ─── 2. 交叉编译双架构（用 cross-rs/cross 解决 musl + SQLite bundled） ───────
  build-binary:
    name: Build ${{ matrix.name }}
    needs: build-frontend
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: linux-amd64
            target: x86_64-unknown-linux-musl
            output: vane-linux-amd64

          - name: linux-arm64
            target: aarch64-unknown-linux-musl
            output: vane-linux-arm64

    steps:
      - uses: actions/checkout@v4

      - name: Download frontend dist
        uses: actions/download-artifact@v4
        with:
          name: frontend-dist
          path: web/dist/

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      # cross 使用 Docker 镜像内置了正确的 musl 工具链，
      # 可以正确交叉编译带 C 代码的 crate（rusqlite bundled、ring、aws-lc-sys）
      - name: Install cross
        run: cargo install cross --git https://github.com/cross-rs/cross --locked

      - name: Inject version into Cargo.toml
        run: |
          VERSION="${{ github.event.inputs.version }}"
          sed -i "s/^version = .*/version = \"${VERSION#v}\"/" Cargo.toml

      - name: Build with cross
        run: |
          cross build --release --target ${{ matrix.target }}
          cp target/${{ matrix.target }}/release/vane ${{ matrix.output }}
          chmod +x ${{ matrix.output }}

      - name: Upload binary
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.output }}
          path: ${{ matrix.output }}
          retention-days: 1

  # ─── 3. 构建并推送 Docker 镜像 ───────────────────────────────────────────────
  build-docker:
    name: Build & Push Docker
    needs: build-binary
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download amd64 binary
        uses: actions/download-artifact@v4
        with:
          name: vane-linux-amd64

      - name: Download arm64 binary
        uses: actions/download-artifact@v4
        with:
          name: vane-linux-arm64

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/vane:latest
            ${{ secrets.DOCKER_USERNAME }}/vane:${{ github.event.inputs.version }}
          build-args: |
            VERSION=${{ github.event.inputs.version }}

  # ─── 4. 计算校验和并发布 Release ─────────────────────────────────────────────
  release:
    name: Create Release
    needs: [build-binary, build-docker]
    runs-on: ubuntu-latest
    steps:
      - name: Download amd64
        uses: actions/download-artifact@v4
        with:
          name: vane-linux-amd64

      - name: Download arm64
        uses: actions/download-artifact@v4
        with:
          name: vane-linux-arm64

      - name: Checksums
        run: |
          sha256sum vane-linux-amd64 vane-linux-arm64 > sha256sums.txt
          cat sha256sums.txt

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.version }}
          name: "Vane ${{ github.event.inputs.version }}"
          body: |
            ## 🌀 Vane ${{ github.event.inputs.version }}

            > Rust 重写版本 — 单二进制，零依赖，内嵌前端。

            ### Docker 镜像
            ```bash
            docker pull ${{ secrets.DOCKER_USERNAME }}/vane:${{ github.event.inputs.version }}
            ```

            ### 直接运行
            ```bash
            # Linux x86_64
            chmod +x vane-linux-amd64 && ./vane-linux-amd64

            # Linux ARM64
            chmod +x vane-linux-arm64 && ./vane-linux-arm64
            ```
            访问 `http://your-ip:4455`，默认账号 `admin / admin`

            ### Docker Compose
            ```yaml
            services:
              vane:
                image: ${{ secrets.DOCKER_USERNAME }}/vane:${{ github.event.inputs.version }}
                restart: unless-stopped
                ports:
                  - "4455:4455"
                volumes:
                  - ./data:/app/data
            ```

            ### 平台支持
            | 平台 | 文件 | 说明 |
            |------|------|------|
            | Linux x86_64 | `vane-linux-amd64` | musl 静态链接 |
            | Linux ARM64  | `vane-linux-arm64` | musl 静态链接 |

          files: |
            vane-linux-amd64
            vane-linux-arm64
            sha256sums.txt
          draft: false
          prerelease: false
