name: Build & Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build Vane
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.21'
          cache: true

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          #cache: 'npm'
          #cache-dependency-path: web/package-lock.json

      - name: Install frontend dependencies
        working-directory: web
        run: npm install

      - name: Build frontend
        working-directory: web
        run: npm run build

      - name: Verify dist
        run: ls -la web/dist/

      - name: Download Go dependencies
        run: go mod download

      - name: Build linux/amd64
        env:
          GOOS: linux
          GOARCH: amd64
          CGO_ENABLED: 0
        run: |
          go build -ldflags="-s -w -X main.Version=${{ github.ref_name }}" \
            -trimpath -o vane-linux-amd64 .

      - name: Build linux/arm64
        env:
          GOOS: linux
          GOARCH: arm64
          CGO_ENABLED: 0
        run: |
          go build -ldflags="-s -w -X main.Version=${{ github.ref_name }}" \
            -trimpath -o vane-linux-arm64 .

      - name: Compress binaries
        run: |
          upx --best vane-linux-amd64 || true
          upx --best vane-linux-arm64 || true
          sha256sum vane-linux-amd64 vane-linux-arm64 > sha256sums.txt

      - name: Create Release
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          name: "Vane ${{ github.ref_name }}"
          body: |
            ## 🌀 Vane ${{ github.ref_name }}

            ### 下载
            | 平台 | 文件 |
            |------|------|
            | Linux x86_64 | `vane-linux-amd64` |
            | Linux ARM64 | `vane-linux-arm64` |

            ### 快速开始
            ```bash
            # Linux amd64
            chmod +x vane-linux-amd64
            ./vane-linux-amd64

            # 访问管理界面
            # http://your-ip:4455
            # 默认账号: admin / vane1234
            ```

            ### 更新日志
            ${{ github.event.head_commit.message }}
          files: |
            vane-linux-amd64
            vane-linux-arm64
            sha256sums.txt
          draft: false
          prerelease: false

      - name: Upload artifacts (non-tag builds)
        uses: actions/upload-artifact@v4
        if: "!startsWith(github.ref, 'refs/tags/')"
        with:
          name: vane-binaries
          path: |
            vane-linux-amd64
            vane-linux-arm64
            sha256sums.txt
          retention-days: 7
