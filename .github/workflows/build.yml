name: Build & Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: '发布版本号 (例如: v1.0.0)'
        required: true
        default: 'test'

permissions:
  contents: write

jobs:
  build:
    name: Build Vane
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve version
        id: ver
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "value=${{ github.event.inputs.version }}" >> $GITHUB_OUTPUT
          else
            echo "value=${{ github.ref_name }}" >> $GITHUB_OUTPUT
          fi

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'
          cache: true

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install frontend dependencies
        working-directory: web
        run: npm install

      - name: Build frontend
        working-directory: web
        run: npm run build

      - name: Verify dist
        run: ls -la web/dist/

      - name: Check embed path
        run: |
          pwd
          find web/dist -type f
          cat main.go | grep embed

      - name: Download Go dependencies
        run: |
          go mod tidy
          go mod download

      - name: Build linux/amd64
        env:
          GOOS: linux
          GOARCH: amd64
          CGO_ENABLED: 0
        run: |
          go build -ldflags="-s -w -X main.Version=${{ steps.ver.outputs.value }}" \
            -trimpath -o vane-linux-amd64 .

      - name: Build linux/arm64
        env:
          GOOS: linux
          GOARCH: arm64
          CGO_ENABLED: 0
        run: |
          go build -ldflags="-s -w -X main.Version=${{ steps.ver.outputs.value }}" \
            -trimpath -o vane-linux-arm64 .

      - name: Checksum
        run: sha256sum vane-linux-amd64 vane-linux-arm64 > sha256sums.txt

      - name: Create Release
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/') || github.event_name == 'workflow_dispatch'
        with:
          tag_name: ${{ steps.ver.outputs.value }}
          name: "Vane ${{ steps.ver.outputs.value }}"
          body: |
            ## 🌀 Vane ${{ steps.ver.outputs.value }}

            ### 下载
            | 平台 | 文件 |
            |------|------|
            | Linux x86_64 | `vane-linux-amd64` |
            | Linux ARM64 | `vane-linux-arm64` |

            ### 快速开始
            ```bash
            # Linux amd64
            chmod +x vane-linux-amd64
            ./vane-linux-amd64

            # 首次启动会在终端打印随机生成的临时密码，请登录后立即修改
            # 访问管理界面: http://your-ip:4455
            ```

            ### 更新日志
            ${{ github.event.head_commit.message }}
          files: |
            vane-linux-amd64
            vane-linux-arm64
            sha256sums.txt
          draft: false
          prerelease: false
